<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Sales Forecast Dashboard</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="dashboard-card">

        <h1>📊 Sales Forecast Dashboard</h1>

        <p class="subtitle">
            Enter monthly sales data and generate analytics charts
        </p>

        <div class="stats">

            <div class="stat-card">
                <h2>12</h2>
                <p>Months</p>
            </div>

            <div class="stat-card">
                <h2>AI</h2>
                <p>Forecast</p>
            </div>

            <div class="stat-card">
                <h2>Live</h2>
                <p>Analytics</p>
            </div>

        </div>

        <form action="/analyze"
              method="POST"
              target="chartFrame"
              id="salesForm">

            <div class="grid">

                <input type="number" name="jan" placeholder="January Sales">
                <input type="number" name="feb" placeholder="February Sales">
                <input type="number" name="mar" placeholder="March Sales">
                <input type="number" name="apr" placeholder="April Sales">
                <input type="number" name="may" placeholder="May Sales">
                <input type="number" name="jun" placeholder="June Sales">
                <input type="number" name="jul" placeholder="July Sales">
                <input type="number" name="aug" placeholder="August Sales">
                <input type="number" name="sep" placeholder="September Sales">
                <input type="number" name="oct" placeholder="October Sales">
                <input type="number" name="nov" placeholder="November Sales">
                <input type="number" name="dec" placeholder="December Sales">

            </div>

            <div class="buttons">

                <button type="submit">
                    Generate Chart
                </button>

                <button type="button"
                        class="clear-btn"
                        onclick="clearForm()">
                    Clear
                </button>

            </div>

        </form>

        <div class="chart-container">

            <iframe name="chartFrame"
                    width="100%"
                    height="500px">
            </iframe>

        </div>

    </div>

</div>

<script>

function clearForm() {

    document.getElementById("salesForm").reset();

}

</script>

</body>
</html>
